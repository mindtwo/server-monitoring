name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']

    name: PHP ${{ matrix.php }}

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, json
          coverage: none

      - name: Drop the monorepo path repository when building standalone
        run: |
          if [ ! -d ../base-monitoring ]; then
            composer config --unset repositories.base-monitoring
          fi

      - run: composer update --prefer-stable --no-interaction --no-progress

      - run: vendor/bin/pest --ci

  php80-syntax:
    runs-on: ubuntu-latest
    name: PHP 8.0 syntax compatibility

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          coverage: none

      - name: Lint all source files on PHP 8.0
        run: find src -name '*.php' -print0 | xargs -0 -n1 -P4 php -l > /dev/null && echo "8.0 syntax OK"
